<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SparkTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        .title-font {
            font-family: 'Space Grotesk', sans-serif;
        }
        .spark-bg {
            background: linear-gradient(135deg, #f3e8ff 0%, #e0f2fe 100%);
        }
    </style>
</head>
<body class="bg-zinc-50 min-h-screen">
    <div class="max-w-4xl mx-auto p-4">
        <!-- Header -->
        <header class="flex justify-between items-center py-6">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-violet-600 rounded-2xl flex items-center justify-center text-white text-2xl">✨</div>
                <div>
                    <h1 class="title-font text-3xl font-semibold tracking-tight text-violet-950">SparkTrack</h1>
                    <p class="text-zinc-500 text-sm">gentle bursts for your mind</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="switchTab(0)" id="tab-0" class="tab-btn px-4 py-2 rounded-xl text-sm font-medium active">Today</button>
                <button onclick="switchTab(1)" id="tab-1" class="tab-btn px-4 py-2 rounded-xl text-sm font-medium">Interests</button>
                <button onclick="switchTab(2)" id="tab-2" class="tab-btn px-4 py-2 rounded-xl text-sm font-medium">Reflections</button>
                <button onclick="switchTab(3)" id="tab-3" class="tab-btn px-4 py-2 rounded-xl text-sm font-medium">Insights</button>
                <button onclick="switchTab(4)" id="tab-4" class="tab-btn px-4 py-2 rounded-xl text-sm font-medium">Data</button>
            </div>
        </header>

        <!-- Greeting -->
        <div id="greeting" class="mb-8"></div>

        <!-- Tabs Content -->
        <div id="tab-content">
            <!-- Today Tab -->
            <div id="tab0" class="tab-panel">
                <div class="bg-white rounded-3xl shadow-sm p-8 mb-6">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h2 class="text-2xl font-semibold text-zinc-800">Current Burst</h2>
                            <p id="current-burst-time" class="text-5xl font-mono text-violet-600 font-semibold mt-2">00:00</p>
                        </div>
                        <button onclick="toggleBurst()" id="burst-btn"
                            class="px-8 py-4 bg-violet-600 hover:bg-violet-700 text-white rounded-2xl text-lg font-medium transition-all flex items-center gap-2">
                            <span id="burst-icon">▶️</span>
                            <span id="burst-text">Start Burst</span>
                        </button>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div onclick="quickLog(15)" class="bg-zinc-100 hover:bg-violet-100 p-6 rounded-2xl cursor-pointer transition-colors text-center">
                            <div class="text-3xl mb-2">15m</div>
                            <div class="text-sm text-zinc-500">Quick Focus</div>
                        </div>
                        <div onclick="quickLog(30)" class="bg-zinc-100 hover:bg-violet-100 p-6 rounded-2xl cursor-pointer transition-colors text-center">
                            <div class="text-3xl mb-2">30m</div>
                            <div class="text-sm text-zinc-500">Deep Work</div>
                        </div>
                    </div>
                </div>

                <!-- Recent Bursts -->
                <div class="bg-white rounded-3xl shadow-sm p-6">
                    <h3 class="font-medium mb-4 flex items-center gap-2">
                        <span>Recent Bursts</span>
                        <span id="today-total" class="ml-auto text-sm text-emerald-600"></span>
                    </h3>
                    <div id="recent-bursts" class="space-y-3"></div>
                </div>
            </div>

            <!-- Interests Tab -->
            <div id="tab1" class="tab-panel hidden">
                <div class="bg-white rounded-3xl shadow-sm p-8">
                    <h2 class="text-2xl font-semibold mb-6">Your Garden of Interests</h2>
                    <div class="flex gap-2 mb-6">
                        <input id="new-interest" type="text" placeholder="New interest or passion..." 
                               class="flex-1 px-5 py-4 border border-zinc-200 rounded-2xl focus:outline-none focus:border-violet-300">
                        <button onclick="addInterest()" 
                                class="px-8 py-4 bg-violet-600 text-white rounded-2xl hover:bg-violet-700">Add</button>
                    </div>
                    <div id="interests-list" class="grid grid-cols-2 gap-3"></div>
                </div>
            </div>

            <!-- Reflections Tab -->
            <div id="tab2" class="tab-panel hidden">
                <div class="bg-white rounded-3xl shadow-sm p-8">
                    <h2 class="text-2xl font-semibold mb-6">Capture a Reflection</h2>
                    <textarea id="reflection-text" rows="6" placeholder="What sparked today? What felt good? What surprised you?"
                              class="w-full px-5 py-4 border border-zinc-200 rounded-3xl focus:outline-none focus:border-violet-300 resize-none"></textarea>
                    <div class="flex gap-3 mt-4">
                        <select id="reflection-interest" class="flex-1 px-5 py-4 border border-zinc-200 rounded-2xl"></select>
                        <button onclick="saveReflection()" 
                                class="px-8 py-4 bg-emerald-600 text-white rounded-2xl hover:bg-emerald-700">Save Reflection</button>
                    </div>
                </div>
                
                <div class="mt-6 bg-white rounded-3xl shadow-sm p-6">
                    <h3 class="font-medium mb-4">Recent Reflections</h3>
                    <div id="recent-reflections" class="space-y-4"></div>
                </div>
            </div>

            <!-- Insights Tab -->
            <div id="tab3" class="tab-panel hidden">
                <div class="bg-white rounded-3xl shadow-sm p-8">
                    <h2 class="text-2xl font-semibold mb-6">Gentle Insights</h2>
                    <canvas id="burstChart" class="w-full h-64"></canvas>
                </div>
            </div>

            <!-- Data Tab -->
            <div id="tab4" class="tab-panel hidden">
                <div class="bg-white rounded-3xl shadow-sm p-8 space-y-6">
                    <div>
                        <h2 class="text-2xl font-semibold mb-4">Data Management</h2>
                        <div class="grid grid-cols-2 gap-4">
                            <button onclick="exportData()" 
                                    class="py-6 px-8 border border-zinc-200 hover:border-violet-300 rounded-3xl text-left">
                                <div class="font-medium">Export Backup</div>
                                <div class="text-sm text-zinc-500">Download JSON</div>
                            </button>
                            <label class="py-6 px-8 border border-zinc-200 hover:border-violet-300 rounded-3xl text-left cursor-pointer">
                                <div class="font-medium">Import Data</div>
                                <div class="text-sm text-zinc-500">Merge from JSON</div>
                                <input type="file" id="import-file" accept=".json" class="hidden" onchange="importData(event)">
                            </label>
                        </div>
                    </div>
                    
                    <button onclick="clearData()" 
                            class="w-full py-4 text-red-600 hover:bg-red-50 rounded-2xl border border-red-200">Clear All Data (with confirmation)</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="hidden fixed bottom-4 right-4 bg-zinc-800 text-white px-6 py-3 rounded-2xl shadow-xl"></div>

    <script>
        // Data Structure
        let data = {
            name: "Faizan",
            interests: [],
            bursts: [], // {id, startTime, duration, interest, notes}
            reflections: [] // {id, timestamp, text, interest}
        };

        let currentBurstInterval = null;
        let currentBurstStart = null;
        let chartInstance = null;

        // Tailwind script already loaded via CDN
        function initTailwind() {
            // Already configured via script tag
        }

        function loadData() {
            const saved = localStorage.getItem('sparktrack_data');
            if (saved) {
                data = JSON.parse(saved);
            }
            // Ensure name
            if (!data.name) data.name = "Faizan";
        }

        function saveData() {
            localStorage.setItem('sparktrack_data', JSON.stringify(data));
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        function updateGreeting() {
            const greetingEl = document.getElementById('greeting');
            const hour = new Date().getHours();
            let greetingText = '';
            if (hour < 12) greetingText = `Good morning, ${data.name}!`;
            else if (hour < 17) greetingText = `Good afternoon, ${data.name}!`;
            else greetingText = `Good evening, ${data.name}!`;
            
            greetingEl.innerHTML = `
                <div class="text-4xl font-light text-zinc-400">${greetingText}</div>
                <div class="text-zinc-500">What sparks today?</div>
            `;
        }

        function switchTab(tabIndex) {
            // Hide all panels
            document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.add('hidden'));
            // Show selected
            document.getElementById(`tab${tabIndex}`).classList.remove('hidden');
            
            // Update active tab
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                if (i === tabIndex) {
                    btn.classList.add('active', 'bg-violet-100', 'text-violet-700');
                } else {
                    btn.classList.remove('active', 'bg-violet-100', 'text-violet-700');
                }
            });

            if (tabIndex === 3) renderInsights();
        }

        function toggleBurst() {
            const btn = document.getElementById('burst-btn');
            const icon = document.getElementById('burst-icon');
            const text = document.getElementById('burst-text');
            
            if (currentBurstInterval) {
                // End burst
                const duration = Math.floor((Date.now() - currentBurstStart) / 60000);
                if (duration > 0) {
                    const interest = data.interests.length > 0 ? data.interests[0] : "General";
                    data.bursts.push({
                        id: Date.now(),
                        startTime: currentBurstStart,
                        duration: duration,
                        interest: interest,
                        notes: ""
                    });
                    saveData();
                    renderRecentBursts();
                    showToast(`Burst of ${duration} minutes saved! ✨`);
                }
                clearInterval(currentBurstInterval);
                currentBurstInterval = null;
                icon.textContent = '▶️';
                text.textContent = 'Start Burst';
                document.getElementById('current-burst-time').textContent = '00:00';
            } else {
                // Start burst
                currentBurstStart = Date.now();
                currentBurstInterval = setInterval(updateBurstTimer, 1000);
                icon.textContent = '⏹️';
                text.textContent = 'End Burst';
                showToast("Burst started! Go with the flow 🌊");
            }
        }

        function updateBurstTimer() {
            if (!currentBurstStart) return;
            const elapsed = Math.floor((Date.now() - currentBurstStart) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            document.getElementById('current-burst-time').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function quickLog(minutes) {
            const interest = data.interests.length > 0 ? data.interests[0] : "General";
            data.bursts.push({
                id: Date.now(),
                startTime: Date.now() - minutes * 60000,
                duration: minutes,
                interest: interest,
                notes: "Quick log"
            });
            saveData();
            renderRecentBursts();
            showToast(`${minutes} minute burst logged!`);
        }

        function renderRecentBursts() {
            const container = document.getElementById('recent-bursts');
            container.innerHTML = '';
            
            const todayBursts = data.bursts.filter(b => {
                const d = new Date(b.startTime);
                return d.toDateString() === new Date().toDateString();
            }).sort((a,b) => b.startTime - a.startTime).slice(0, 5);
            
            if (todayBursts.length === 0) {
                container.innerHTML = '<div class="text-zinc-400 text-center py-8">No bursts yet today. Start one above!</div>';
                document.getElementById('today-total').textContent = '';
                return;
            }
            
            let totalToday = todayBursts.reduce((sum, b) => sum + b.duration, 0);
            document.getElementById('today-total').textContent = `${totalToday} min today`;
            
            todayBursts.forEach(burst => {
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between bg-zinc-50 p-4 rounded-2xl';
                div.innerHTML = `
                    <div>
                        <div class="font-medium">${burst.interest}</div>
                        <div class="text-sm text-zinc-500">${new Date(burst.startTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-xl font-semibold text-violet-600">${burst.duration} min</div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function addInterest() {
            const input = document.getElementById('new-interest');
            const name = input.value.trim();
            if (!name) return;
            
            if (!data.interests.includes(name)) {
                data.interests.push(name);
                saveData();
                renderInterests();
                showToast(`Added ${name} to your garden 🌱`);
            }
            input.value = '';
        }

        function renderInterests() {
            const container = document.getElementById('interests-list');
            container.innerHTML = '';
            
            data.interests.forEach((interest, index) => {
                const div = document.createElement('div');
                div.className = 'bg-white border border-zinc-100 p-6 rounded-3xl flex items-center justify-between group';
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-amber-100 text-amber-600 rounded-2xl flex items-center justify-center text-xl">🌱</div>
                        <div class="font-medium">${interest}</div>
                    </div>
                    <button onclick="removeInterest(${index})" 
                            class="opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-600 transition-all">✕</button>
                `;
                container.appendChild(div);
            });
            
            if (data.interests.length === 0) {
                container.innerHTML = '<div class="col-span-2 text-center py-12 text-zinc-400">No interests yet. Add some above to tend your garden!</div>';
            }
        }

        function removeInterest(index) {
            if (confirm(`Remove ${data.interests[index]}?`)) {
                data.interests.splice(index, 1);
                saveData();
                renderInterests();
            }
        }

        function saveReflection() {
            const text = document.getElementById('reflection-text').value.trim();
            if (!text) return;
            
            const interestSelect = document.getElementById('reflection-interest');
            const interest = interestSelect.value || (data.interests[0] || "General");
            
            data.reflections.push({
                id: Date.now(),
                timestamp: Date.now(),
                text: text,
                interest: interest
            });
            
            saveData();
            document.getElementById('reflection-text').value = '';
            renderRecentReflections();
            showToast("Reflection saved. Beautiful work. 🌟");
        }

        function renderRecentReflections() {
            const container = document.getElementById('recent-reflections');
            container.innerHTML = '';
            
            const recent = data.reflections.slice().reverse().slice(0, 3);
            
            if (recent.length === 0) {
                container.innerHTML = '<div class="text-zinc-400 py-8 text-center">No reflections yet. Take a moment to capture what felt meaningful.</div>';
                return;
            }
            
            recent.forEach(ref => {
                const div = document.createElement('div');
                div.className = 'border-l-4 border-emerald-400 pl-6 py-1';
                div.innerHTML = `
                    <div class="text-xs text-zinc-500">${new Date(ref.timestamp).toLocaleDateString()}</div>
                    <div class="italic text-zinc-600">"${ref.text}"</div>
                    <div class="text-xs text-violet-500 mt-1">${ref.interest}</div>
                `;
                container.appendChild(div);
            });
        }

        function populateInterestSelect() {
            const select = document.getElementById('reflection-interest');
            select.innerHTML = '';
            data.interests.forEach(int => {
                const opt = document.createElement('option');
                opt.value = int;
                opt.textContent = int;
                select.appendChild(opt);
            });
            if (data.interests.length === 0) {
                const opt = document.createElement('option');
                opt.value = "General";
                opt.textContent = "General";
                select.appendChild(opt);
            }
        }

        function renderInsights() {
            const ctx = document.getElementById('burstChart');
            if (chartInstance) chartInstance.destroy();
            
            // Simple weekly data aggregation
            const last7Days = {};
            for (let i = 6; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const key = d.toISOString().split('T')[0];
                last7Days[key] = 0;
            }
            
            data.bursts.forEach(b => {
                const dateKey = new Date(b.startTime).toISOString().split('T')[0];
                if (last7Days.hasOwnProperty(dateKey)) {
                    last7Days[dateKey] += b.duration;
                }
            });
            
            const labels = Object.keys(last7Days).map(d => new Date(d).toLocaleDateString([], {weekday: 'short'}));
            const values = Object.values(last7Days);
            
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Minutes',
                        data: values,
                        backgroundColor: '#a78bfa',
                        borderColor: '#7c3aed',
                        borderWidth: 2,
                        borderRadius: 8,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: { mode: 'index', intersect: false }
                    },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#f3e8ff' } },
                        x: { grid: { color: '#f3e8ff' } }
                    }
                }
            });
        }

        function exportData() {
            const jsonStr = JSON.stringify(data, null, 2);
            const blob = new Blob([jsonStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `sparktrack-backup-${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast("Backup downloaded! Keep it safe.");
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    // Merge logic
                    if (imported.interests) {
                        data.interests = [...new Set([...data.interests, ...imported.interests])];
                    }
                    if (imported.bursts) data.bursts = [...data.bursts, ...imported.bursts];
                    if (imported.reflections) data.reflections = [...data.reflections, ...imported.reflections];
                    
                    saveData();
                    renderAll();
                    showToast("Data imported successfully! Merged gently.");
                } catch (err) {
                    showToast("Invalid backup file.");
                }
            };
            reader.readAsText(file);
        }

        function clearData() {
            if (confirm("This will delete ALL your SparkTrack data permanently. Are you sure?")) {
                localStorage.removeItem('sparktrack_data');
                data = { name: "Faizan", interests: [], bursts: [], reflections: [] };
                renderAll();
                showToast("Data cleared. Fresh start! 🌱");
            }
        }

        function renderAll() {
            loadData();
            updateGreeting();
            renderRecentBursts();
            renderInterests();
            populateInterestSelect();
            renderRecentReflections();
            // Insights on switch
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' && document.activeElement.tagName !== 'TEXTAREA' && document.activeElement.tagName !== 'INPUT') {
                e.preventDefault();
                toggleBurst();
            }
        });

        // Initialize
        window.onload = function() {
            renderAll();
            switchTab(0); // Start on Today tab
        };

        // PWA support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {});
        }
    </script>
</body>
</html>
